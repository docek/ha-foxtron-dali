name: validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run catches Home Assistant API drift even without pushes
    - cron: "0 4 * * 1"

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
